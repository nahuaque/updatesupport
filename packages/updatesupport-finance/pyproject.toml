[build-system]
requires = ["setuptools>=77", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "updatesupport-finance"
version = "0.1.1"
description = "Financial model-risk extensions for updatesupport"
readme = "README.md"
license = "MIT"
requires-python = ">=3.10"
keywords = [
    "credit-risk",
    "expected-loss",
    "financial-model-risk",
    "model-validation",
    "updatesupport",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Financial and Insurance Industry",
    "Intended Audience :: Science/Research",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Office/Business :: Financial",
]
dependencies = [
    "updatesupport>=0.1.2",
]

[project.urls]
Homepage = "https://github.com/nahuaque/updatesupport"
Repository = "https://github.com/nahuaque/updatesupport"
Issues = "https://github.com/nahuaque/updatesupport/issues"

[project.entry-points."updatesupport.plugins"]
finance = "updatesupport_finance:plugin"

[dependency-groups]
dev = [
    "pytest>=8.0",
    "ruff>=0.8",
    "twine>=6.1",
]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.setuptools.packages.find]
where = ["src"]
include = ["updatesupport_finance*"]

[tool.uv.sources]
updatesupport = { workspace = true }
