name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked --all-packages --group dev --extra cvxpy --extra examples --extra residopt

      - name: Test core
        run: uv run pytest

      - name: Test finance
        run: uv run --package updatesupport-finance pytest packages/updatesupport-finance/tests

  quality:
    name: Quality
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked --all-packages --group dev --group docs --extra cvxpy --extra examples --extra residopt

      - name: Lint
        run: uv run ruff check .

      - name: Build docs
        run: uv run --group docs sphinx-build -W -b html docs docs/_build/html

      - name: Security check
        run: uv run bandit -q -r updatesupport examples tests packages

  package:
    name: Package
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked --all-packages --group dev --extra cvxpy --extra examples --extra residopt

      - name: Build core distributions
        run: uv build

      - name: Build finance distributions
        run: uv build --package updatesupport-finance --out-dir dist/finance

      - name: Check core distributions
        run: uv run twine check dist/*.whl dist/*.tar.gz

      - name: Check finance distributions
        run: uv run twine check dist/finance/*
